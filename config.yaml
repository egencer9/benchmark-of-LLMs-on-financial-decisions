# Configuration for LLM models, especially for providers like OpenRouter.

# A list of models to be used with the OpenRouter provider.
# Set 'active: true' to include the model in the simulation.

api_call_interval: 3

openrouter_models:
  - alias: "Xiaomi Mimo V2 Flash"
    model_name: "xiaomi/mimo-v2-flash:free"
    active: true

  - alias: "NVIDIA Nemotron 3 Nano"
    model_name: "nvidia/nemotron-3-nano-30b-a3b:free"
    active: true

  - alias: "Llama 3.1 8B Free"
    model_name: "meta-llama/llama-3-8b-instruct:free"
    active: false

  - alias: "Gemma 2 9B Free"
    model_name: "google/gemma-2-9b-it:free"
    active: false
