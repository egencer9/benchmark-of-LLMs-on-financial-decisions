# Configuration for LLM models, especially for providers like OpenRouter.

# A list of models to be used with the OpenRouter provider.
# The program will use the FIRST model in this list.

openrouter_models:
  - alias: "Meta Llama 3 70B Instruct"
    model_name: "meta-llama/llama-3-70b-instruct"

  - alias: "Google Gemini 1.5 Flash"
    model_name: "google/gemini-1.5-flash"

  - alias: "Anthropic Claude 3.5 Haiku"
    model_name: "anthropic/claude-3.5-haiku"

  - alias: "OpenAI GPT-4o Mini"
    model_name: "openai/gpt-4o-mini"

  - alias: "NVIDIA Nemotron 4 340B Instruct"
    model_name: "nvidia/nemotron-4-340b-instruct"

